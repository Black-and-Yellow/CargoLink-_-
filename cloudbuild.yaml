steps:

  # ── Backend ──────────────────────────────────────────────────────────────────

  - name: "node:20"
    id: "backend-install"
    dir: "backend"
    entrypoint: "npm"
    args: ["install", "--omit=dev"]

  # Fetch every secret from Secret Manager and append it to backend/app.yaml
  # as a plain env_variables entry so App Engine Standard can read them.
  # App Engine Standard does NOT support secret_env_variables in app.yaml.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "inject-backend-secrets"
    secretEnv:
      - MONGO_URI
      - JWT_ACCESS_SECRET
      - JWT_REFRESH_SECRET
      - GOOGLE_CLIENT_ID
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - RAZORPAY_KEY_ID
      - RAZORPAY_KEY_SECRET
      - GOOGLE_MAPS_API_KEY
    entrypoint: "bash"
    args:
      - "-c"
      - |
        for var in MONGO_URI JWT_ACCESS_SECRET JWT_REFRESH_SECRET GOOGLE_CLIENT_ID ADMIN_EMAIL ADMIN_PASSWORD RAZORPAY_KEY_ID RAZORPAY_KEY_SECRET GOOGLE_MAPS_API_KEY; do
          val="${!var}"
          # Escape backslashes then double-quotes so the value is safe inside YAML double-quoted string
          val="${val//\\/\\\\}"
          val="${val//\"/\\\"}"
          printf '  %s: "%s"\n' "$var" "$val" >> backend/app.yaml
        done
        echo "--- backend/app.yaml after secret injection ---"
        cat backend/app.yaml

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    waitFor: ["backend-install", "inject-backend-secrets"]
    entrypoint: "gcloud"
    args:
      - "app"
      - "deploy"
      - "backend/app.yaml"
      - "--quiet"
      - "--project=$PROJECT_ID"

  # ── Frontend ─────────────────────────────────────────────────────────────────

  - name: "node:20"
    id: "frontend-install"
    dir: "frontend"
    entrypoint: "npm"
    args: ["install"]

  - name: "node:20"
    id: "frontend-build"
    waitFor: ["frontend-install"]
    dir: "frontend"
    entrypoint: "npm"
    args: ["run", "build"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    waitFor: ["frontend-build"]
    entrypoint: "gcloud"
    args:
      - "app"
      - "deploy"
      - "frontend/app.yaml"
      - "--quiet"
      - "--project=$PROJECT_ID"

  # ── Dispatch rules ────────────────────────────────────────────────────────────

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-dispatch"
    waitFor: ["deploy-backend", "deploy-frontend"]
    entrypoint: "gcloud"
    args:
      - "app"
      - "deploy"
      - "dispatch.yaml"
      - "--quiet"
      - "--project=$PROJECT_ID"

timeout: "1200s"

options:
  logging: CLOUD_LOGGING_ONLY

# Cloud Build fetches these from Secret Manager and exposes them as env vars
# in any step that lists them under secretEnv.
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/MONGO_URI/versions/latest
      env: MONGO_URI
    - versionName: projects/$PROJECT_ID/secrets/JWT_ACCESS_SECRET/versions/latest
      env: JWT_ACCESS_SECRET
    - versionName: projects/$PROJECT_ID/secrets/JWT_REFRESH_SECRET/versions/latest
      env: JWT_REFRESH_SECRET
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: GOOGLE_CLIENT_ID
    - versionName: projects/$PROJECT_ID/secrets/ADMIN_EMAIL/versions/latest
      env: ADMIN_EMAIL
    - versionName: projects/$PROJECT_ID/secrets/ADMIN_PASSWORD/versions/latest
      env: ADMIN_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/RAZORPAY_KEY_ID/versions/latest
      env: RAZORPAY_KEY_ID
    - versionName: projects/$PROJECT_ID/secrets/RAZORPAY_KEY_SECRET/versions/latest
      env: RAZORPAY_KEY_SECRET
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_MAPS_API_KEY/versions/latest
      env: GOOGLE_MAPS_API_KEY
